
{% load static %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCSMonitor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            width: 1500px;
            background-color: #f3f3f3;
        }

        .titlebar {
            background-color: #6a0dad;
            overflow: hidden;
            text-align: center;
            color: white;
        }

        .footer {
            background-color: #6a0dad;
            color: white;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
        
      
        .button {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 14px;
            font-family: -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            border-radius: 6px;
            border: none;
            margin: 0 25px;

            background: #6E6D70;
            box-shadow: 0px 0.5px 1px rgba(0, 0, 0, 0.1), inset 0px 0.5px 0.5px rgba(255, 255, 255, 0.5), 0px 0px 0px 0.5px rgba(0, 0, 0, 0.12);
            color: #DFDEDF;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }


        .button-active {
            color: #fff;
            background: linear-gradient(180deg, #7129a4 0%, #6a0dad 100%);
        }


        .card {
            border-radius: 20px;
            margin-bottom: 80px;
            display: flex;
            width: 750px;
            height: 500px;
            box-shadow: 10px 10px 5px lightgray;
            border-color: black;
            border-style:  solid;
            border-width: 1px;
            background-color: white;
        }

        .sm-card {
            font-size: 15px;
            border-radius: 5px;
            display: flex;
            width: 75px;
            height: 40px;
            padding: 4px;
            box-shadow: 2px 2px 1px lightgray;
            border-color: black;
            border-style:  solid;
            border-width: 1px;
            background-color: white;
        }

        .content {
            display: flex;
            width: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .button-nav {
            display: flex; 
            margin: 20px;
            position: relative;
        }

        table {
            font-size:  small;
            width: 100%;
            height: fit-content;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }
        th {
            background-color: #f2f2f2;
            text-align: left;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>
    <div class="titlebar">
        <h1>Traffic Control System Monitor</h1>
    </div>
    <div class="content">
        <div class="button-nav">
            <button id="btn0" class="button button-active" onclick="setCard(0)" role="button">Display</button>
            <button id="btn1" class="button" onclick="setCard(1)" role="button">Data Table</button>
        </div>
        <div>
            <div class="sm-card" id="last_update" style="width: fit-content; height: fit-content; margin-bottom: 20px; background-color: #7129a4; color: white;">Last Update: </div>
            <form>
                <label for="refresh_period">Refresh Period: </label>
                <select name="refresh_period" id="refresh_period" onchange="setPeriod()">
                    <option value="1000">1sec</option>
                    <option value="2000">2secs</option>
                    <option value="5000">5secs</option>
                    <option value="10000">10secs</option>
                </select>
            </form>
        </div>
        <div id="card0" class="card" style='background: url("/static/t_junc.jpg")'>

        </div>
        <div id="card1" class="card" style='display: none; width: max-content; height:fit-content; padding: 10px;'>
        <table id="data_table">
        </table>
        </div>
    </div>
    <div class="footer">
        <p>&copy; <a href="https://www.linkedin.com/in/enejiohieku" style="color: lightgray;">EnejiOhieku.</a> All rights reserved.</p>
    </div>

    <script src="/static/index.js"></script>
</body>
</html>
